name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Build Docker image
        run: docker build -t cmmb:latest .

      - name: Deploy to server
        # This is a placeholder - actual deployment strategy depends on infrastructure
        # Options: SSH deploy, Docker Hub push, Kubernetes, etc.
        run: |
          echo "Deployment step - configure based on your infrastructure"
          # Example: docker push registry/cmmb:latest
          # Example: ssh user@server 'docker pull cmmb:latest && docker-compose up -d'