name: Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback:
        description: 'Rollback to previous version'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and push Docker image
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for rollback

      - name: Determine version
        id: version
        run: |
          if [[ "${{ inputs.rollback }}" == "true" ]]; then
            # Get previous commit for rollback
            VERSION=$(git rev-parse HEAD~1 | cut -c1-7)
            echo "Rollback version: ${VERSION}"
          else
            VERSION=$(git rev-parse HEAD | cut -c1-7)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

  # Job 2: Run database migrations
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: inputs.rollback != 'true'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run database migrations
        run: |
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify migration status
        run: |
          npx prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Job 3: Deploy to production server
  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: inputs.rollback != 'true'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          script: |
            # Set environment variables
            export IMAGE_TAG="${{ needs.build.outputs.version }}"
            export REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"

            # Login to container registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

            # Pull the new image
            docker pull $REGISTRY/$IMAGE_NAME:$IMAGE_TAG

            # Tag as latest
            docker tag $REGISTRY/$IMAGE_NAME:$IMAGE_TAG $REGISTRY/$IMAGE_NAME:latest

            # Stop existing containers gracefully
            docker-compose down --timeout 30 || true

            # Start new containers
            docker-compose up -d

            # Clean up old images
            docker image prune -f

      - name: Wait for container startup
        run: sleep 30

  # Job 4: Health check verification
  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: inputs.rollback != 'true'
    environment: production

    steps:
      - name: Health check
        id: health
        run: |
          MAX_RETRIES=10
          RETRY_INTERVAL=10
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.PRODUCTION_DOMAIN }}/api/health || echo "000")

            if [ "$RESPONSE" == "200" ]; then
              echo "Health check passed!"
              echo "status=healthy" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Health check failed (HTTP $RESPONSE), retrying..."
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep $RETRY_INTERVAL
          done

          echo "Health check failed after $MAX_RETRIES retries"
          echo "status=unhealthy" >> $GITHUB_OUTPUT
          exit 1

      - name: Detailed health check
        if: success()
        run: |
          curl -s https://${{ secrets.PRODUCTION_DOMAIN }}/api/health | jq .

  # Job 5: Rollback if health check fails
  rollback-on-failure:
    runs-on: ubuntu-latest
    needs: [build, health-check]
    if: failure() && inputs.rollback != 'true'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous version
        id: prev_version
        run: |
          PREV_VERSION=$(git rev-parse HEAD~1 | cut -c1-7)
          echo "prev_version=${PREV_VERSION}" >> $GITHUB_OUTPUT

      - name: Rollback deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          script: |
            export PREV_VERSION="${{ steps.prev_version.outputs.prev_version }}"
            export REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"

            # Pull previous image
            docker pull $REGISTRY/$IMAGE_NAME:$PREV_VERSION || docker pull $REGISTRY/$IMAGE_NAME:latest

            # Stop containers
            docker-compose down --timeout 30

            # Start with previous image
            docker tag $REGISTRY/$IMAGE_NAME:$PREV_VERSION $REGISTRY/$IMAGE_NAME:latest || true
            docker-compose up -d

      - name: Verify rollback health
        run: |
          sleep 30
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.PRODUCTION_DOMAIN }}/api/health || echo "000")

            if [ "$RESPONSE" == "200" ]; then
              echo "Rollback successful!"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 10
          done

          echo "Rollback health check failed!"
          exit 1

      - name: Notify on rollback
        if: success()
        run: |
          echo "::warning::Deployment rolled back to previous version due to health check failure"

  # Job 6: Manual rollback
  manual-rollback:
    runs-on: ubuntu-latest
    needs: build
    if: inputs.rollback == 'true'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get target version
        id: target_version
        run: |
          TARGET_VERSION=$(git rev-parse HEAD~1 | cut -c1-7)
          echo "Rolling back to version: ${TARGET_VERSION}"
          echo "target_version=${TARGET_VERSION}" >> $GITHUB_OUTPUT

      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          script: |
            export TARGET_VERSION="${{ steps.target_version.outputs.target_version }}"
            export REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"

            # Login to container registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

            # Pull the target image
            docker pull $REGISTRY/$IMAGE_NAME:$TARGET_VERSION || {
              echo "Image not found in registry, building from git..."
              # Fallback: checkout the previous commit and build
              cd /tmp
              rm -rf cmmb-rollback
              git clone --depth 50 https://github.com/${{ github.repository }}.git cmmb-rollback
              cd cmmb-rollback
              git checkout ${{ steps.target_version.outputs.target_version }}
              docker build -t $REGISTRY/$IMAGE_NAME:$TARGET_VERSION .
              docker push $REGISTRY/$IMAGE_NAME:$TARGET_VERSION
            }

            # Tag as latest
            docker tag $REGISTRY/$IMAGE_NAME:$TARGET_VERSION $REGISTRY/$IMAGE_NAME:latest

            # Stop and restart containers
            docker-compose down --timeout 30
            docker-compose up -d

      - name: Verify rollback health
        run: |
          sleep 30
          MAX_RETRIES=10
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.PRODUCTION_DOMAIN }}/api/health || echo "000")

            if [ "$RESPONSE" == "200" ]; then
              echo "Manual rollback successful!"
              curl -s https://${{ secrets.PRODUCTION_DOMAIN }}/api/health | jq .
              exit 0
            fi

            echo "Health check retry $RETRY_COUNT..."
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 10
          done

          echo "Manual rollback health check failed!"
          exit 1