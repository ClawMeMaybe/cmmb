name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback:
        description: "Rollback to previous deployment"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and push Docker image
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.rollback != 'true' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}},value=0.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Run database migrations
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.rollback != 'true' }}
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Create migration backup
        run: |
          echo "Creating database backup before migration..."
          # Backup script would be implemented based on infrastructure
          # Example: mysqldump -h $DB_HOST -u $DB_USER -p$DB_PASS $DB_NAME > backup_$(date +%Y%m%d_%H%M%S).sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Deploy to production server
  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production
    outputs:
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to server
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Create deployment record
            DEPLOY_ID=$(date +%Y%m%d%H%M%S)_${{ needs.build.outputs.image_tag }}
            echo "deployment_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

            # Pull new image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

            # Tag previous image as backup (for rollback)
            if docker images | grep -q "${{ env.IMAGE_NAME }}:latest"; then
              docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:backup_$DEPLOY_ID
            fi

            # Stop existing container if running
            docker stop cmmb-app || true
            docker rm cmmb-app || true

            # Run new container
            docker run -d \
              --name cmmb-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

            # Tag new image as latest
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} ${{ env.IMAGE_NAME }}:latest

      - name: Wait for application startup
        run: sleep 30

  # Health check verification
  health-check:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health check
        id: health
        run: |
          echo "Performing health check..."

          # Retry health check up to 5 times with 10 second intervals
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }}/api/health || echo "000")

            if [ "$RESPONSE" = "200" ]; then
              echo "Health check passed!"
              echo "status=healthy" >> $GITHUB_OUTPUT
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Health check attempt $RETRY_COUNT failed (HTTP $RESPONSE), retrying in 10 seconds..."
            sleep 10
          done

          echo "Health check failed after $MAX_RETRIES attempts"
          echo "status=unhealthy" >> $GITHUB_OUTPUT
          exit 1

      - name: Get health details
        if: success()
        run: |
          echo "Fetching detailed health status..."
          curl -s ${{ secrets.APP_URL }}/api/health | jq '.' || echo "Failed to parse health response"

      - name: Notify on health failure
        if: failure()
        run: |
          echo "::warning::Health check failed - deployment may be incomplete"

  # Rollback deployment
  rollback:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.rollback == 'true' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: List available backups
        id: backups
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            echo "Available backup images:"
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ env.IMAGE_NAME }}:backup_" | sort -r | head -5

      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Find most recent backup
            BACKUP_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ env.IMAGE_NAME }}:backup_" | sort -r | head -1)

            if [ -z "$BACKUP_IMAGE" ]; then
              echo "No backup image found for rollback"
              exit 1
            fi

            echo "Rolling back to: $BACKUP_IMAGE"

            # Stop and remove current container
            docker stop cmmb-app || true
            docker rm cmmb-app || true

            # Run backup container
            docker run -d \
              --name cmmb-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              $BACKUP_IMAGE

            echo "Rollback completed successfully"

      - name: Wait for application startup
        run: sleep 30

      - name: Verify rollback health
        run: |
          echo "Verifying rollback health..."

          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }}/api/health || echo "000")

            if [ "$RESPONSE" = "200" ]; then
              echo "Rollback health check passed!"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Health check attempt $RETRY_COUNT failed (HTTP $RESPONSE), retrying..."
            sleep 10
          done

          echo "Rollback health check failed"
          exit 1

  # Cleanup old backup images
  cleanup:
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: success()

    steps:
      - name: Cleanup old backups
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            echo "Cleaning up old backup images (keeping last 3)..."
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ env.IMAGE_NAME }}:backup_" | sort -r | tail -n +4 | xargs -r docker rmi || true
            echo "Cleanup completed"
